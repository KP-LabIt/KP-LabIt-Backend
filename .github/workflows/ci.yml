name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY_SETTINGS: ci-test-secret-key-not-for-production-min-50-chars-xyz
      CI: "true"
      # Force SQLite: no DATABASE_URL in repo; ignore any accidental Actions secret
      DATABASE_URL: ""
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # --skip-checks: check runs before migrate and would query Role before tables exist
      - name: Migrate (SQLite)
        run: python manage.py migrate --noinput --skip-checks

      - name: Django system check
        run: python manage.py check

      - name: Run tests
        run: python manage.py test --verbosity 2
