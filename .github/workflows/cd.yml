name: CD

# Pushes Docker image to ghcr.io/<owner>/<repo>:latest (on main/master) and :<sha>.
# On tag v1.2.3 also pushes :v1.2.3

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Image name (lowercase)
        run: echo "IMAGE_NAME=${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build tags list
        id: tags
        run: |
          IMG="${{ env.IMAGE_NAME }}"
          SHA="${{ github.sha }}"
          LIST="${IMG}:${SHA:0:7}"
          case "${{ github.ref }}" in
            refs/heads/main|refs/heads/master)
              LIST="${LIST},${IMG}:latest"
              ;;
            refs/tags/v*)
              LIST="${LIST},${IMG}:${GITHUB_REF#refs/tags/}"
              ;;
          esac
          echo "tags=${LIST}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
